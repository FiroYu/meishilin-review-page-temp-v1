<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2027 携程美食林理事终审投票页</title>
  <style>
    :root {
      --paper: #fbfaf7;
      --paper-2: #f2eee6;
      --ink: #171717;
      --muted: #6f6a61;
      --line: #d9d1c3;
      --gold: #b48a3c;
      --blue: #275d8c;
      --teal: #2f746d;
      --red: #b42318;
      --black: #070707;
      --shadow: 0 28px 80px rgba(0, 0, 0, .42);
      font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; background: var(--paper); color: var(--ink); }
    body {
      overflow: hidden;
      background: var(--paper);
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .45; }

    .device {
      width: min(430px, 100vw);
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      border: 0;
      border-radius: 0;
      background: var(--paper);
      box-shadow: none;
      overflow: hidden;
      position: relative;
    }
    .island {
      display: none;
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 118px;
      height: 31px;
      border-radius: 999px;
      background: #020202;
      z-index: 40;
    }
    .status {
      display: none;
      height: 48px;
      padding: 17px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 700;
      background: rgba(251, 250, 247, .92);
      border-bottom: 1px solid rgba(217, 209, 195, .7);
      position: relative;
      z-index: 20;
    }
    .app {
      height: 100%;
      position: relative;
      overflow: hidden;
      background: var(--paper);
    }
    .stage {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity .26s ease, transform .26s ease;
    }
    .stage.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .screen-pad { padding: 16px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(env(safe-area-inset-top, 0px) + 10px) 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 250, 247, .95);
      flex: 0 0 auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .seal {
      width: 36px;
      height: 36px;
      border: 1px solid var(--gold);
      display: grid;
      place-items: center;
      color: var(--gold);
      font-weight: 800;
      letter-spacing: .06em;
      background: #fffdf9;
    }
    h1, h2, h3, p { margin: 0; }
    .eyebrow {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 800;
    }
    .title {
      font-size: 18px;
      line-height: 1.12;
      font-weight: 860;
      color: var(--black);
    }
    .sub {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }
    .lang {
      flex: 0 0 auto;
      width: 34px;
      height: 26px;
      padding: 0;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .72);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
    }
    .lang:hover { border-color: var(--gold); color: var(--ink); background: #fff; }
    .gateway {
      justify-content: space-between;
      background:
        linear-gradient(180deg, rgba(180, 138, 60, .12), transparent 34%),
        var(--paper);
    }
    .hero-mark {
      padding-top: 28px;
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 12px;
    }
    .hero-seal {
      width: 82px;
      height: 82px;
      border: 1px solid var(--gold);
      display: grid;
      place-items: center;
      color: var(--gold);
      background: #fffdf8;
      font-weight: 900;
      font-size: 22px;
      position: relative;
    }
    .hero-seal:before, .hero-seal:after {
      content: "";
      position: absolute;
      inset: 10px;
      border-top: 1px solid rgba(180, 138, 60, .36);
      border-bottom: 1px solid rgba(180, 138, 60, .36);
      transform: rotate(45deg);
    }
    .hero-seal:after { transform: rotate(-45deg); }
    .form-surface {
      background: rgba(255, 255, 255, .72);
      border-top: 1px solid var(--line);
      padding: 20px;
      display: grid;
      gap: 16px;
    }
    .field { display: grid; gap: 8px; }
    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 0;
      padding: 11px 12px;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(180, 138, 60, .13);
    }
    textarea { resize: none; line-height: 1.45; }
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .choice {
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px 10px;
      text-align: left;
      display: grid;
      gap: 3px;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }
    .choice strong { font-size: 13px; }
    .choice span { font-size: 11px; color: var(--muted); }
    .choice.active {
      border-color: var(--black);
      background: #171717;
      color: #fff;
      transform: translateY(-1px);
    }
    .choice.active span { color: rgba(255,255,255,.68); }
    .primary, .secondary, .ghost, .danger {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-weight: 850;
      font-size: 13px;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .primary { background: var(--black); color: #fff; }
    .primary:hover:not(:disabled), .secondary:hover:not(:disabled), .ghost:hover:not(:disabled) { transform: translateY(-1px); }
    .secondary { background: #fff; border: 1px solid var(--line); color: var(--ink); }
    .ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); }
    .danger { background: #fff; border: 1px solid rgba(180, 35, 24, .32); color: var(--red); }

    .board { background: var(--paper); }
    .city-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: #fffdf9;
    }
    .city-label { display: grid; gap: 2px; min-width: 0; }
    .city-label strong { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .filters {
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(242, 238, 230, .65);
    }
    .filter-line { display: grid; grid-template-columns: 1fr 126px; gap: 8px; }
    .pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .pill {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      white-space: nowrap;
    }
    .pill.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 10px;
    }
    .restaurant {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--line);
      text-align: left;
      width: 100%;
      color: var(--ink);
    }
    .restaurant:hover { border-color: var(--gold); }
    .restaurant .secondary {
      min-height: 30px;
      padding: 0 9px;
      font-size: 11px;
    }
    .thumb {
      height: 72px;
      background:
        linear-gradient(135deg, rgba(180,138,60,.18), rgba(47,116,109,.12)),
        #f5f0e6;
      border: 1px solid rgba(180, 138, 60, .25);
      display: grid;
      place-items: center;
      color: var(--gold);
      font-weight: 900;
      font-size: 18px;
    }
    .rest-body { min-width: 0; display: grid; gap: 6px; }
    .rest-title { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .rest-title strong { font-size: 14px; line-height: 1.25; }
    .rest-title span { font-size: 11px; color: var(--muted); }
    .meta { font-size: 11px; color: var(--muted); line-height: 1.35; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      border: 1px solid var(--line);
      padding: 4px 6px;
      font-size: 10px;
      font-weight: 850;
      color: var(--muted);
      background: #fffdf9;
    }
    .tag.gold { color: #7b581c; border-color: rgba(180,138,60,.36); background: rgba(180,138,60,.09); }
    .tag.teal { color: var(--teal); border-color: rgba(47,116,109,.28); background: rgba(47,116,109,.08); }
    .tag.blue { color: var(--blue); border-color: rgba(39,93,140,.28); background: rgba(39,93,140,.08); }
    .quick-actions { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
    .rest-action { align-self: center; white-space: nowrap; }
    .empty {
      border: 1px dashed var(--line);
      background: rgba(255,255,255,.58);
      padding: 30px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .bottom-bar {
      display: grid;
      grid-template-columns: 92px 1fr 116px;
      gap: 8px;
      align-items: center;
      padding: 8px 10px calc(env(safe-area-inset-bottom, 0px) + 8px);
      border-top: 1px solid var(--line);
      background: rgba(251,250,247,.96);
      flex: 0 0 auto;
    }
    .progress {
      text-align: center;
      display: grid;
      gap: 3px;
      font-size: 11px;
      color: var(--muted);
      min-width: 0;
    }
    .progress strong { font-size: 13px; color: var(--ink); }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: flex-end;
      background: rgba(0,0,0,.38);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .sheet {
      width: 100%;
      max-height: 82%;
      background: var(--paper);
      border-top: 1px solid var(--line);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.16, 1, .3, 1);
      display: flex;
      flex-direction: column;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      background: #fffdf9;
    }
    .sheet-body { padding: 14px; overflow-y: auto; display: grid; gap: 14px; }
    .x { width: 34px; height: 34px; background: #fff; border: 1px solid var(--line); font-weight: 900; }
    .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .checklist {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.64);
      padding: 10px;
      display: grid;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }
    .ok { color: var(--teal); font-weight: 850; }
    .bad { color: var(--red); font-weight: 850; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .nomination {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .nomination-head { display: flex; justify-content: space-between; gap: 10px; }
    .tiers {
      height: 300px;
      display: grid;
      grid-template-columns: .9fr 1fr 1.1fr;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #fff;
    }
    .tier { overflow-y: auto; border-right: 1px solid var(--line); }
    .tier:last-child { border-right: 0; }
    .tier button {
      width: 100%;
      text-align: left;
      background: #fff;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(217,209,195,.65);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }
    .tier button.active { background: var(--paper-2); color: var(--ink); border-left: 4px solid var(--gold); }
    .result-list { display: grid; gap: 8px; }
    .result-list button {
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      padding: 10px;
      display: grid;
      gap: 2px;
    }
    .confirm, .cert { background: var(--paper); }
    .summary {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
      padding: 16px 20px;
      display: grid;
      gap: 12px;
    }
    .metric-grid { display: grid; gap: 10px; }
    .metric {
      border: 1px solid var(--line);
      padding: 12px;
      background: #fffdf9;
      display: grid;
      gap: 4px;
    }
    .metric b { font-size: 24px; }
    .metric span { font-size: 11px; color: var(--muted); font-weight: 760; }
    .review-metrics {
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      grid-template-columns: 1fr 1.25fr;
      overflow: hidden;
    }
    .review-total {
      padding: 14px;
      background: #fffdf9;
      border-right: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 3px;
    }
    .review-total b { font-size: 30px; line-height: 1; }
    .review-total span, .review-breakdown span { font-size: 11px; color: var(--muted); font-weight: 760; }
    .review-breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .review-side {
      padding: 14px 12px;
      display: grid;
      align-content: center;
      gap: 4px;
    }
    .review-side + .review-side { border-left: 1px solid var(--line); }
    .review-side b { font-size: 22px; }
    .audit-list {
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      gap: 0;
      max-height: 220px;
      overflow-y: auto;
    }
    .audit-row {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(217,209,195,.72);
      display: grid;
      gap: 4px;
      font-size: 12px;
    }
    .audit-row:last-child { border-bottom: 0; }
    .audit-row strong { font-size: 13px; }
    .footer-actions {
      margin-top: auto;
      padding: 10px 12px calc(env(safe-area-inset-bottom, 0px) + 10px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      border-top: 1px solid var(--line);
      flex: 0 0 auto;
    }
    .receipt {
      margin: 18px;
      padding: 16px;
      background: #fff;
      border: 1px solid var(--gold);
      display: grid;
      gap: 12px;
    }
    .receipt-row { display: grid; grid-template-columns: 100px 1fr; gap: 10px; font-size: 13px; border-bottom: 1px solid rgba(217,209,195,.7); padding-bottom: 8px; }
    .receipt-row span:first-child { color: var(--muted); font-weight: 760; }
    .toast {
      position: absolute;
      left: 50%;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      transform: translate(-50%, -8px);
      max-width: 82%;
      background: #121212;
      color: #fff;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      z-index: 120;
      transition: opacity .2s ease, transform .2s ease;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .cert > .screen-pad:last-child { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); }

    @media (max-width: 520px) {
      .device {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 0;
      }
      .island { display: none; }
      .bottom-bar { grid-template-columns: 88px 1fr 110px; }
    }
  </style>
</head>
<body>
  <main class="device" aria-label="2027 携程美食林理事终审投票页">
    <div class="island" aria-hidden="true"></div>
    <div class="status"><span id="clock">09:41</span><span>5G · 100%</span></div>
    <div class="toast" id="toast"></div>
    <section class="app">
      <div class="stage gateway active" id="stage-login">
        <div class="topbar">
          <div class="brand">
            <div class="seal">GL</div>
            <div>
              <p class="eyebrow" data-i18n="portal">Expert Council Portal</p>
            </div>
          </div>
          <button class="lang" id="lang-login" aria-label="Switch language">EN</button>
        </div>
        <div class="hero-mark screen-pad">
          <div class="hero-seal">林</div>
          <p class="eyebrow" data-i18n="year">年度终审通道</p>
          <h2 class="title" data-i18n="loginHeadline">理事投票与专家终审工作台</h2>
          <p class="sub" data-i18n="loginSub">用于年度榜单最终审议、补充提名、电子签署与结果存根。</p>
        </div>
        <div class="form-surface">
          <div class="field">
            <label for="expert-name" data-i18n="nameLabel">评审专家姓名</label>
            <input id="expert-name" autocomplete="name" placeholder="请输入真实姓名 / 拼音">
          </div>
          <div class="field">
            <label data-i18n="roleLabel">选择评审席位</label>
            <div class="role-grid">
              <button class="choice" data-role="BOARD_MEMBER"><strong data-i18n="roleBoard">理事会成员</strong><span data-i18n="roleBoardSub">理事席位</span></button>
              <button class="choice" data-role="CONSULTANT"><strong data-i18n="roleConsultant">特邀顾问</strong><span data-i18n="roleConsultantSub">顾问席位</span></button>
            </div>
          </div>
          <button class="primary" id="enter" disabled data-i18n="enter">开始评审</button>
        </div>
      </div>

      <div class="stage board" id="stage-board">
        <div class="topbar">
          <div class="brand">
            <div class="seal">GL</div>
            <div>
              <p class="eyebrow" data-i18n="boardKicker">2027年美食林高端榜单评审</p>
              <h2 class="title" data-i18n="boardTitle">待评审餐厅</h2>
            </div>
          </div>
          <button class="lang" id="lang-board" aria-label="Switch language">EN</button>
        </div>
        <div class="city-row">
          <div class="city-label">
            <span class="sub" data-i18n="currentCity">当前评审城市</span>
            <strong id="city-label">中国 · 上海</strong>
          </div>
          <button class="secondary" id="open-city" data-i18n="switchCity">切换城市</button>
        </div>
        <div class="filters">
          <div class="filter-line">
            <input id="search" placeholder="搜索商户、菜系、城市">
            <select id="rating-filter"></select>
          </div>
          <div class="pills" id="state-pills"></div>
        </div>
        <div class="list-wrap" id="restaurant-list"></div>
        <div class="bottom-bar">
          <button class="secondary" id="open-add" data-i18n="addNomination">增补</button>
          <div class="progress"><span data-i18n="progress">当前站点统计</span><strong id="progress-label">增补 0 | 已评 0</strong></div>
          <button class="primary" id="submit-board" disabled data-i18n="submitBoard">终审落库</button>
        </div>
      </div>

      <div class="stage confirm" id="stage-confirm">
        <div class="topbar">
          <div class="brand">
            <div class="seal">签</div>
            <div>
              <p class="eyebrow" data-i18n="confirmKicker">终审确认</p>
              <h2 class="title" data-i18n="confirmTitle">终审结论确认</h2>
            </div>
          </div>
        </div>
        <div class="screen-pad" style="display:grid;gap:16px;overflow-y:auto;">
          <p class="sub" data-i18n="confirmSub">请核对本城市审议结果，可补充整体意见后进行电子签署。</p>
          <div class="metric-grid" id="confirm-metrics"></div>
          <div class="summary">
            <p class="eyebrow" id="audit-title">提交前复核</p>
            <div class="audit-list" id="confirm-audit"></div>
          </div>
          <div class="field">
            <label for="final-opinion" data-i18n="opinionLabel">总体评审意见与寄语（可选）</label>
            <textarea id="final-opinion" rows="7" placeholder="可填写对本大区餐饮趋势、榜单结构或评审建议的总体意见。"></textarea>
          </div>
        </div>
        <div class="footer-actions">
          <button class="secondary" id="back-board" data-i18n="backEdit">返回修改</button>

  <script>
    const dict = {

        addKicker: "Supplementary Nomination", addTitle: "Submit Nomination", addName: "Merchant name", addCountry: "Country",
        addCity: "City", addReason: "Professional reason (15+ chars)", saveNom: "Save nomination", savedNoms: "Saved nominations",
        allRatings: "All ratings", all: "All", pending: "Pending", agreed: "Agreed", adjusted: "Adjusted",
        reviewed: "Reviewed", nominations: "Nominations", empty: "No merchants match this filter.", open: "Start Review",
        keep: "Keep original rating", adjust: "Suggest adjustment", target: "Target rating", reason: "Professional rationale (15+ chars)",
        saveDecision: "Save decision", removed: "Remove from list", citySearchEmpty: "No city matched.",
        copied: "Signed receipt copied.", loginReady: "Identity verified. Workspace unlocked.", savedDecision: "Decision saved.",
        savedNom: "Supplementary nomination saved.", needOne: "Submit unlocks after one decision or one nomination.",
        noOpinion: "No overall remarks.", quickAgree: "Start Review", startReview: "Start Review", auditTitle: "Pre-submit Review",
        auditEmpty: "No adjustments or nominations in this city.", adjustmentDetail: "Adjustment", nominationDetail: "Nominated Restaurant",
        thanksNote: "Thank you for submitting this premium list review. Your professional judgment will enter the committee review workflow and support the final annual list release.",
        reviewedGroup: "Reviewed restaurants", keepCount: "Keep original rating", adjustCount: "Suggested adjustments"

    };

    const ratings = ["BLACK_DIAMOND", "DIAMOND", "PLATINUM"];
    const ratingText = {
      zh: { BLACK_DIAMOND: "黑钻", DIAMOND: "钻石", PLATINUM: "铂金", REMOVED: "移出榜单" },
      en: { BLACK_DIAMOND: "Black Diamond", DIAMOND: "Diamond", PLATINUM: "Platinum", REMOVED: "Removed" }
    };
    const spatial = {
      ASIA: { zh: "亚洲", en: "Asia", countries: {
        CN: { zh: "中国", en: "China", cities: ["上海", "北京", "成都", "广州", "香港"] },
        JP: { zh: "日本", en: "Japan", cities: ["东京", "京都", "大阪"] },
        SG: { zh: "新加坡", en: "Singapore", cities: ["新加坡"] }
      }},
      EUROPE: { zh: "欧洲", en: "Europe", countries: {
        FR: { zh: "法国", en: "France", cities: ["巴黎", "里昂"] },
        UK: { zh: "英国", en: "United Kingdom", cities: ["伦敦"] },
        IT: { zh: "意大利", en: "Italy", cities: ["米兰", "罗马"] }
      }},
      AMERICA: { zh: "北美", en: "North America", countries: {
        US: { zh: "美国", en: "United States", cities: ["纽约", "旧金山", "洛杉矶"] },
        CA: { zh: "加拿大", en: "Canada", cities: ["温哥华", "多伦多"] }
      }}
    };
    const cityEn = { 上海:"Shanghai", 北京:"Beijing", 成都:"Chengdu", 广州:"Guangzhou", 香港:"Hong Kong", 东京:"Tokyo", 京都:"Kyoto", 大阪:"Osaka", 新加坡:"Singapore", 巴黎:"Paris", 里昂:"Lyon", 伦敦:"London", 米兰:"Milan", 罗马:"Rome", 纽约:"New York", 旧金山:"San Francisco", 洛杉矶:"Los Angeles", 温哥华:"Vancouver", 多伦多:"Toronto" };
    const restaurants = [
      ["sh-01","上海","甬府","Yongfoo Elite","BLACK_DIAMOND","江浙菜","Jiangzhe",980],
      ["sh-02","上海","福和慧","Fu He Hui","DIAMOND","素食精致料理","Vegetarian fine dining",1280],
      ["sh-03","上海","菁禧荟","Jing Xi Hui","DIAMOND","粤菜","Cantonese",760],
      ["sh-04","上海","遇外滩","Meet the Bund","PLATINUM","闽菜","Fujian",680],
      ["sh-05","上海","雍颐庭","Yong Yi Ting","PLATINUM","淮扬菜","Huaiyang",720],
      ["bj-01","北京","京兆尹","King's Joy","BLACK_DIAMOND","素食","Vegetarian",1200],
      ["bj-02","北京","新荣记","Xin Rong Ji","DIAMOND","台州菜","Taizhou",900],
      ["cd-01","成都","玉芝兰","Yu Zhi Lan","DIAMOND","川菜","Sichuan",880],
      ["gz-01","广州","炳胜品味","Bingsheng Mansion","PLATINUM","粤菜","Cantonese",520],
      ["hk-01","香港","唐阁","T'ang Court","BLACK_DIAMOND","粤菜","Cantonese",1500],
      ["tk-01","东京","GINZA Kojyu","Ginza Kojyu","BLACK_DIAMOND","怀石料理","Kaiseki",2200],
      ["pa-01","巴黎","Le Cinq","Le Cinq","BLACK_DIAMOND","法餐","French",2600],
      ["ny-01","纽约","Atomix","Atomix","DIAMOND","韩式创意","Korean contemporary",1800]
    ].map(([id, city, nameZh, nameEn, rating, cuisineZh, cuisineEn, price]) => ({id, city, nameZh, nameEn, rating, cuisineZh, cuisineEn, price}));

    const state = {
      lang: "zh", role: "", expert: "", stage: "login",
      city: "上海", continent: "ASIA", country: "CN",
      search: "", rating: "ALL", status: "ALL",
      reviews: {}, nominations: [], decision: null, receipt: null, confirmOpinion: ""
    };

    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));
    const tr = k => dict[state.lang][k] || k;
    const cityName = c => state.lang === "zh" ? c : (cityEn[c] || c);
    const countryName = key => spatial[state.continent].countries[key][state.lang === "zh" ? "zh" : "en"];
    const html = value => String(value).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));

    function init() {
      setInterval(updateClock, 10000); updateClock();
      $("#lang-login").onclick = $("#lang-board").onclick = toggleLang;
      $("#expert-name").addEventListener("input", validateLogin);
      $$(".choice[data-role]").forEach(btn => btn.onclick = () => { state.role = btn.dataset.role; validateLogin(); renderRoles(); });
      $("#enter").onclick = enter;
      $("#open-city").onclick = () => openSheet("city-sheet");
      $("#open-add").onclick = () => { renderNominations(); validateNomination(); openSheet("add-sheet"); };
      $("#submit-board").onclick = openConfirm;
      $("#search").oninput = e => { state.search = e.target.value; renderBoard(); };
      $("#rating-filter").onchange = e => { state.rating = e.target.value; renderBoard(); };
      $("#city-search").oninput = renderCitySelector;
      $("#back-board").onclick = () => { state.confirmOpinion = $("#final-opinion").value; showStage("board"); };
      $("#final-sign").onclick = sign;
      $("#copy-receipt").onclick = copyReceipt;
      $("#reset").onclick = resetAll;
      ["nom-name","nom-country","nom-city","nom-reason"].forEach(id => $("#" + id).addEventListener("input", validateNomination));
      $("#save-nom").onclick = saveNomination;
      $$("[data-close]").forEach(b => b.onclick = () => closeSheet(b.dataset.close));
      render();
    }

    function updateClock() {
      const d = new Date();
      $("#clock").textContent = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    function toggleLang() {
      state.lang = state.lang === "zh" ? "en" : "zh";
      render();
      if ($("#decision-sheet").classList.contains("open")) renderDecision();
      if ($("#add-sheet").classList.contains("open")) renderNominations();
      if ($("#city-sheet").classList.contains("open")) renderCitySelector();
    }

    function translateStatic() {
      $$("[data-i18n]").forEach(el => el.textContent = tr(el.dataset.i18n));
      $("#lang-login").textContent = state.lang === "zh" ? "EN" : "中";
      $("#lang-board").textContent = state.lang === "zh" ? "EN" : "中";
      $("#expert-name").placeholder = state.lang === "zh" ? "请输入真实姓名 / 拼音" : "Enter real name / pinyin";
      $("#search").placeholder = state.lang === "zh" ? "搜索商户、菜系、城市" : "Search merchant, cuisine or city";
      $("#city-search").placeholder = state.lang === "zh" ? "输入城市或国家名称" : "Type a city or country";
      $("#final-opinion").placeholder = state.lang === "zh" ? "可填写对本大区餐饮趋势、榜单结构或评审建议的总体意见。" : "Add regional trend, list structure or review recommendations.";
      $("#nom-reason").placeholder = state.lang === "zh" ? "说明为什么该商户不应被遗漏。" : "Explain why this merchant should not be missed.";
    }

    function validateLogin() {
      state.expert = $("#expert-name").value.trim();
      $("#enter").disabled = !(state.expert.length >= 2 && state.role);
    }

    function renderRoles() {
      $$(".choice[data-role]").forEach(btn => btn.classList.toggle("active", btn.dataset.role === state.role));
    }

    function enter() {
      validateLogin();
      if ($("#enter").disabled) return;
      showStage("board");
      toast(tr("loginReady"));
    }

    function showStage(name) {
      state.stage = name;
      $$(".stage").forEach(s => s.classList.remove("active"));
      $("#stage-" + name).classList.add("active");
      if (name === "board") renderBoard();
      if (name === "confirm") renderConfirm();
      if (name === "cert") renderReceipt();
    }

    function render() {
      translateStatic();
      renderRoles();
      validateLogin();
      renderBoard();
      renderCitySelector();
      if (state.stage === "confirm") renderConfirm();
      if (state.stage === "cert") renderReceipt();
    }

    function renderBoard() {
      $("#city-label").textContent = `${countryName(state.country)} · ${cityName(state.city)}`;
      const sel = $("#rating-filter");
      sel.innerHTML = `<option value="ALL">${tr("allRatings")}</option>` + ratings.map(r => `<option value="${r}">${ratingText[state.lang][r]}</option>`).join("");
      sel.value = state.rating;
      renderPills();
      const list = filteredRestaurants();
      $("#restaurant-list").innerHTML = list.length ? list.map(restaurantCard).join("") : `<div class="empty">${tr("empty")}</div>`;
      $$("#restaurant-list .restaurant").forEach(card => card.onclick = event => {
        const start = event.target.closest("[data-start-review]");
        if (start) {
          openDecision(start.dataset.startReview);
          return;
        }
        openDecision(card.dataset.id);
      });
      const s = stats();
      $("#progress-label").textContent = `${tr("nominations")} ${s.nominations} | ${tr("reviewed")} ${s.reviewed}`;
      $("#submit-board").disabled = s.reviewed + s.nominations < 1;
    }

    function renderPills() {
      const scoped = restaurants.filter(r => r.city === state.city);
      const counts = {
        ALL: scoped.length,
        PENDING: scoped.filter(r => !state.reviews[r.id]).length,
        AGREED: scoped.filter(r => state.reviews[r.id]?.status === "AGREED").length,
        ADJUSTED: scoped.filter(r => state.reviews[r.id]?.status === "ADJUSTED").length
      };
      const labels = { ALL: tr("all"), PENDING: tr("pending"), AGREED: tr("agreed"), ADJUSTED: tr("adjusted") };
      $("#state-pills").innerHTML = Object.keys(labels).map(key => `<button class="pill ${state.status === key ? "active" : ""}" data-status="${key}">${labels[key]} (${counts[key]})</button>`).join("");
      $$("#state-pills button").forEach(b => b.onclick = () => { state.status = b.dataset.status; renderBoard(); });
    }

    function filteredRestaurants() {
      const q = state.search.trim().toLowerCase();
      return restaurants.filter(r => {
        if (r.city !== state.city) return false;
        if (state.rating !== "ALL" && r.rating !== state.rating) return false;
        const review = state.reviews[r.id];
        if (state.status === "PENDING" && review) return false;
        if (state.status === "AGREED" && review?.status !== "AGREED") return false;
        if (state.status === "ADJUSTED" && review?.status !== "ADJUSTED") return false;
        if (!q) return true;
        return [r.nameZh, r.nameEn, r.cuisineZh, r.cuisineEn, cityName(r.city)].join(" ").toLowerCase().includes(q);
      });
    }

    function restaurantCard(r) {
      const review = state.reviews[r.id];
      const status = !review ? `<span class="tag">${tr("pending")}</span>` :
        review.status === "AGREED" ? `<span class="tag teal">${tr("agreed")}</span>` :
        `<span class="tag blue">${tr("adjusted")} → ${ratingText[state.lang][review.target]}</span>`;
      const action = `<button class="secondary rest-action" data-start-review="${r.id}">${tr("startReview")}</button>`;
      return `<div class="restaurant" data-id="${r.id}" role="button" tabindex="0">
        <div class="thumb">${r.nameZh.slice(0,1)}</div>
        <div class="rest-body">
          <div class="rest-title"><strong>${html(state.lang === "zh" ? r.nameZh : r.nameEn)}</strong></div>
          <p class="meta">${html(state.lang === "zh" ? r.cuisineZh : r.cuisineEn)} · ${state.lang === "zh" ? "人均" : "Average"} ¥${r.price}</p>
          <div class="tag-row"><span class="tag gold">${ratingText[state.lang][r.rating]}</span>${status}</div>
        </div>
        ${action}
      </div>`;
    }

    function openDecision(id) {
      const r = restaurants.find(item => item.id === id);
      const existing = state.reviews[id];
      state.decision = existing ? { restaurantId: id, status: existing.status, target: existing.target || "", reason: existing.reason || "" } : { restaurantId: id, status: "", target: "", reason: "" };
      $("#desk-name").textContent = state.lang === "zh" ? r.nameZh : r.nameEn;
      $("#desk-rating").textContent = ratingText[state.lang][r.rating];
      $("#desk-meta").textContent = `${state.lang === "zh" ? r.cuisineZh : r.cuisineEn} · ${state.lang === "zh" ? "人均" : "Average"} ¥${r.price}`;
      renderDecision();
      openSheet("decision-sheet");
    }

    function renderDecision() {
      const r = restaurants.find(item => item.id === state.decision.restaurantId);
      const d = state.decision;
      const targets = ratings.filter(x => x !== r.rating).concat("REMOVED");
      $("#decision-body").innerHTML = `
        <div class="seg">
          <button class="choice ${d.status === "AGREED" ? "active" : ""}" data-decision="AGREED"><strong>${tr("keep")}</strong><span>${ratingText[state.lang][r.rating]}</span></button>
          <button class="choice ${d.status === "ADJUSTED" ? "active" : ""}" data-decision="ADJUSTED"><strong>${tr("adjust")}</strong><span>${tr("reason")}</span></button>
        </div>
        <div id="adjust-area" style="${d.status === "ADJUSTED" ? "" : "display:none"};display:${d.status === "ADJUSTED" ? "grid" : "none"};gap:14px;">
          <div class="field"><label>${tr("target")}</label><select id="decision-target"><option value="">--</option>${targets.map(x => `<option value="${x}">${ratingText[state.lang][x]}</option>`).join("")}</select></div>
          <div class="field"><label>${tr("reason")}</label><textarea id="decision-reason" rows="4">${html(d.reason)}</textarea></div>
          <div class="checklist" id="decision-check"></div>
        </div>
        <button class="primary" id="save-decision" disabled>${tr("saveDecision")}</button>`;
      $$("#decision-body [data-decision]").forEach(b => b.onclick = () => { state.decision.status = b.dataset.decision; renderDecision(); });
      const target = $("#decision-target");
      const reason = $("#decision-reason");
      if (target) { target.value = d.target; target.onchange = e => { state.decision.target = e.target.value; validateDecision(); }; }
      if (reason) { reason.oninput = e => { state.decision.reason = e.target.value; validateDecision(); }; }
      $("#save-decision").onclick = saveDecision;
      validateDecision();
    }

    function validateDecision() {
      const d = state.decision;
      let ok = d.status === "AGREED";
      if (d.status === "ADJUSTED") {
        const hasTarget = !!d.target;
        const hasReason = d.reason.trim().length >= 15;
        ok = hasTarget && hasReason;
        $("#decision-check").innerHTML = `<span class="${hasTarget ? "ok" : "bad"}">${hasTarget ? "✓" : "□"} ${tr("target")}</span><span class="${hasReason ? "ok" : "bad"}">${hasReason ? "✓" : "□"} ${tr("reason")} (${d.reason.trim().length}/15)</span>`;
      }
      $("#save-decision").disabled = !ok;
    }

    function saveDecision() {
      const d = state.decision;
      if ($("#save-decision").disabled) return;
      state.reviews[d.restaurantId] = d.status === "AGREED"
        ? { status: "AGREED" }
        : { status: "ADJUSTED", target: d.target, reason: d.reason.trim() };
      closeSheet("decision-sheet");
      renderBoard();
      toast(tr("savedDecision"));
    }

    function renderCitySelector() {
      const q = $("#city-search")?.value.trim().toLowerCase() || "";
      const tiers = $("#city-tiers");
      const results = $("#city-results");
      if (q) {
        tiers.hidden = true; results.hidden = false;
        const matches = flatCities().filter(item => [item.city, cityEn[item.city], item.country.zh, item.country.en, item.continent.zh, item.continent.en].join(" ").toLowerCase().includes(q));
        results.innerHTML = matches.length ? matches.map(item => `<button data-city="${item.city}" data-cont="${item.contKey}" data-country="${item.countryKey}"><strong>${cityName(item.city)}</strong><span class="sub">${item.country[state.lang === "zh" ? "zh" : "en"]} · ${item.continent[state.lang === "zh" ? "zh" : "en"]}</span></button>`).join("") : `<div class="empty">${tr("citySearchEmpty")}</div>`;
        $$("#city-results button").forEach(b => b.onclick = () => selectCity(b.dataset.city, b.dataset.cont, b.dataset.country));
        return;
      }
      tiers.hidden = false; results.hidden = true;
      const continents = Object.keys(spatial).map(k => `<button class="${k === state.continent ? "active" : ""}" data-cont="${k}">${spatial[k][state.lang === "zh" ? "zh" : "en"]}</button>`).join("");
      const countries = Object.keys(spatial[state.continent].countries).map(k => `<button class="${k === state.country ? "active" : ""}" data-country="${k}">${spatial[state.continent].countries[k][state.lang === "zh" ? "zh" : "en"]}</button>`).join("");
      const cities = spatial[state.continent].countries[state.country].cities.map(c => `<button class="${c === state.city ? "active" : ""}" data-city="${c}">${cityName(c)}</button>`).join("");
      tiers.innerHTML = `<div class="tier">${continents}</div><div class="tier">${countries}</div><div class="tier">${cities}</div>`;
      $$("#city-tiers [data-cont]").forEach(b => b.onclick = () => { state.continent = b.dataset.cont; state.country = Object.keys(spatial[state.continent].countries)[0]; renderCitySelector(); });
      $$("#city-tiers [data-country]").forEach(b => b.onclick = () => { state.country = b.dataset.country; renderCitySelector(); });
      $$("#city-tiers [data-city]").forEach(b => b.onclick = () => selectCity(b.dataset.city, state.continent, state.country));
    }

    function flatCities() {
      const out = [];
      Object.entries(spatial).forEach(([contKey, continent]) => Object.entries(continent.countries).forEach(([countryKey, country]) => country.cities.forEach(city => out.push({ contKey, countryKey, continent, country, city }))));
      return out;
    }

    function selectCity(city, cont, country) {
      state.city = city; state.continent = cont; state.country = country;
      state.search = ""; state.rating = "ALL"; state.status = "ALL";
      $("#search").value = ""; $("#city-search").value = "";
      closeSheet("city-sheet");
      renderBoard();
      toast(`${cityName(city)} · ${countryName(country)}`);
    }

    function validateNomination() {
      const name = $("#nom-name").value.trim(), country = $("#nom-country").value.trim(), city = $("#nom-city").value.trim(), reason = $("#nom-reason").value.trim();
      const filled = !!(name && country && city);
      const reasonOk = reason.length >= 15;
      $("#nom-check").innerHTML = `<span class="${filled ? "ok" : "bad"}">${filled ? "✓" : "□"} ${state.lang === "zh" ? "名称、国家、城市已填写" : "Name, country and city filled"}</span><span class="${reasonOk ? "ok" : "bad"}">${reasonOk ? "✓" : "□"} ${tr("addReason")} (${reason.length}/15)</span>`;
      $("#save-nom").disabled = !(filled && reasonOk);
    }

    function saveNomination() {
      if ($("#save-nom").disabled) return;
      state.nominations.push({
        id: Date.now(),
        reviewCity: state.city,
        reviewCountry: state.country,
        name: $("#nom-name").value.trim(),
        country: $("#nom-country").value.trim(),
        city: $("#nom-city").value.trim(),
        reason: $("#nom-reason").value.trim()
      });
      ["nom-name","nom-country","nom-city","nom-reason"].forEach(id => $("#" + id).value = "");
      renderNominations(); validateNomination(); renderBoard();
      toast(tr("savedNom"));
    }

    function renderNominations() {
      const list = $("#nom-list");
      const current = currentNominations();
      list.innerHTML = current.length ? current.map(n => `<div class="nomination"><div class="nomination-head"><strong>${html(n.name)}</strong><button class="danger" data-del="${n.id}">撤回</button></div><p class="meta">${html(n.country)} · ${html(n.city)}</p><p class="sub">${html(n.reason)}</p></div>`).join("") : `<p class="sub">${state.lang === "zh" ? "暂无增补提名。" : "No saved nominations."}</p>`;
      $$("#nom-list [data-del]").forEach(b => b.onclick = () => { state.nominations = state.nominations.filter(n => String(n.id) !== b.dataset.del); renderNominations(); renderBoard(); });
    }

    function currentNominations() {
      return state.nominations.filter(n => (n.reviewCity || n.city) === state.city);
    }

    function openConfirm() {
      if ($("#submit-board").disabled) { toast(tr("needOne")); return; }
      showStage("confirm");
    }

    function stats() {
      const scoped = restaurants.filter(r => r.city === state.city);
      const agreed = scoped.filter(r => state.reviews[r.id]?.status === "AGREED").length;
      const adjusted = scoped.filter(r => state.reviews[r.id]?.status === "ADJUSTED").length;
      return { total: scoped.length, reviewed: agreed + adjusted, agreed, adjusted, nominations: currentNominations().length };
    }

    function renderConfirm() {
      const s = stats();
      $("#confirm-metrics").innerHTML = `
        <div class="review-metrics">
          <div class="review-total"><b>${s.reviewed}</b><span>${tr("reviewedGroup")}</span></div>
          <div class="review-breakdown">
            <div class="review-side"><b>${s.agreed}</b><span>${tr("keepCount")}</span></div>
            <div class="review-side"><b>${s.adjusted}</b><span>${tr("adjustCount")}</span></div>
          </div>
        </div>`;
      $("#audit-title").textContent = tr("auditTitle");
      renderAuditDetails();
      $("#final-opinion").value = state.confirmOpinion;
    }

    function renderAuditDetails() {
      const adjustedRows = restaurants
        .filter(r => r.city === state.city && state.reviews[r.id]?.status === "ADJUSTED")
        .map(r => {
          const review = state.reviews[r.id];
          return `<div class="audit-row"><strong>${tr("adjustmentDetail")} · ${html(state.lang === "zh" ? r.nameZh : r.nameEn)}</strong><span class="meta">${ratingText[state.lang][r.rating]} → ${ratingText[state.lang][review.target]}</span><span>${html(review.reason)}</span></div>`;
        });
      const nominationRows = currentNominations().map(n => `<div class="audit-row"><strong>${tr("nominationDetail")} · ${html(n.name)}</strong><span class="meta">${html(n.country)} · ${html(n.city)}</span><span>${html(n.reason)}</span></div>`);
      $("#confirm-audit").innerHTML = adjustedRows.concat(nominationRows).join("") || `<div class="audit-row"><span class="sub">${tr("auditEmpty")}</span></div>`;
    }

    function sign() {
      state.confirmOpinion = $("#final-opinion").value.trim();
      const s = stats();
      const ts = new Date();
      state.receipt = {
        expert: state.expert, role: state.role === "BOARD_MEMBER" ? tr("roleBoard") : tr("roleConsultant"),
        city: `${cityName(state.city)} · ${countryName(state.country)}`,
        stats: `${tr("reviewed")} ${s.reviewed}/${s.total} · ${tr("agreed")} ${s.agreed} · ${tr("adjusted")} ${s.adjusted} · ${tr("nominations")} ${s.nominations}`,
        opinion: state.confirmOpinion || tr("noOpinion"),
        time: `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,"0")}-${String(ts.getDate()).padStart(2,"0")} ${String(ts.getHours()).padStart(2,"0")}:${String(ts.getMinutes()).padStart(2,"0")}:${String(ts.getSeconds()).padStart(2,"0")}`
      };
      showStage("cert");
    }

    function renderReceipt() {
      if (!state.receipt) return;
      const rows = state.lang === "zh"
        ? [["专家姓名",state.receipt.expert],["评审身份",state.receipt.role],["评审城市",state.receipt.city],["结论摘要",state.receipt.stats],["总体意见",state.receipt.opinion],["提交时间",state.receipt.time]]
        : [["Expert",state.receipt.expert],["Role",state.receipt.role],["Station",state.receipt.city],["Summary",state.receipt.stats],["Remarks",state.receipt.opinion],["Submitted at",state.receipt.time]];
      $("#receipt").innerHTML = rows.map(([k,v]) => `<div class="receipt-row"><span>${k}</span><strong>${html(v)}</strong></div>`).join("");
      $("#thanks-note").textContent = tr("thanksNote");
    }

    function copyReceipt() {
      const text = Array.from($("#receipt").querySelectorAll(".receipt-row")).map(row => row.innerText.replace(/\n/g, ": ")).join("\n");
      if (navigator.clipboard) navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
      else fallbackCopy(text);
      toast(tr("copied"));
    }

    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
    }

    function resetAll() {
      Object.assign(state, { role: "", expert: "", stage: "login", city: "上海", continent: "ASIA", country: "CN", search: "", rating: "ALL", status: "ALL", reviews: {}, nominations: [], decision: null, receipt: null, confirmOpinion: "" });
      $("#expert-name").value = ""; $("#search").value = ""; $("#final-opinion").value = "";
      ["nom-name","nom-country","nom-city","nom-reason"].forEach(id => $("#" + id).value = "");
      showStage("login"); render();
    }

    function openSheet(id) { $("#" + id).classList.add("open"); if (id === "city-sheet") renderCitySelector(); }
    function closeSheet(id) { $("#" + id).classList.remove("open"); }
    function toast(text) {
      const el = $("#toast");
      el.textContent = text; el.classList.add("show");
      clearTimeout(toast.timer); toast.timer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    init();
  </script>
</body>
</html>
